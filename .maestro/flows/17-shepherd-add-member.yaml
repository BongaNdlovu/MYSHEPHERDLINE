appId: ${E2E_APP_ID}
---
- runFlow: ../subflows/login.yaml
- tapOn:
    id: tab-people
- assertVisible:
    id: people-screen
- tapOn:
    id: people-add
- assertVisible:
    id: people-add-form
- tapOn:
