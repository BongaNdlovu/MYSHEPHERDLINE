appId: ${E2E_APP_ID}
---
- runFlow: ../subflows/login.yaml
- tapOn:
    id: tab-people
- tapOn:
    text: ${E2E_MEMBER_NAME}
- tapOn:
    id: member-log-care-action
- assertVisible:
    id: log-care-action-screen
- tapOn:
    id: log-care-action-type-call
- tapOn:
    id: log-care-action-notes
- inputText: E2E visit note from Maestro
- hideKeyboard
- tapOn:
    id: log-care-action-save
- extendedWaitUntil:
    visible:
      id: app-toast
    timeout: 15000
