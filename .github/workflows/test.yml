name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npx expo export -p web
      - run: npm run deploy -- --dry-run
      - run: npm run typecheck --workspace myshepherdline-worker
